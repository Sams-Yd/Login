<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:30px;
}

.wrap{
max-width:1000px;
margin:auto;
}

.top{
background:white;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.profile{
display:flex;
align-items:center;
gap:15px;
}

.profile img{
width:60px;
height:60px;
border-radius:50%;
}

.logout{
background:#ef4444;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.big{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>
<body>

<div class="wrap">

<div class="top">

<div class="profile">
<img id="photo" src="">
<div>
<h2 id="name">User</h2>
<p id="email"></p>
</div>
</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="cards">

<div class="card">
<p>Status</p>
<div class="big">Aktif</div>
</div>

<div class="card">
<p>Frontend</p>
<div class="big">GitHub</div>
</div>

<div class="card">
<p>Backend</p>
<div class="big">Golang</div>
</div>

<div class="card">
<p>Login</p>
<div class="big">Google</div>
</div>

</div>

</div>

<script>
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

document.getElementById("name").innerText =
localStorage.getItem("name");

document.getElementById("email").innerText =
localStorage.getItem("email");

document.getElementById("photo").src =
localStorage.getItem("photo");

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
