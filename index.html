<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Google - Sams Project</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif;">
        <h1>Selamat Datang di Aplikasi Saya</h1>
        
        <div id="g_id_onload"
             data-client_id="700649521479-pg9lerspa7oos4b5t2ihimf0j76g60l7.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
        
        <p id="status-text" style="margin-top: 20px; color: gray;">Silakan login untuk melanjutkan</p>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // Token dari Google
            const token = response.credential;
            console.log("Token Google berhasil didapat:", token);

            // Menampilkan status sementara
            const statusLabel = document.getElementById("status-text");
            statusLabel.innerText = "Sedang memverifikasi ke backend...";
            statusLabel.style.color = "blue";

            // Alamat Backend Alwaysdata kamu
            const backendUrl = "https://sams-yd.alwaysdata.net/login";

            // Mengirim token ke Backend Golang menggunakan Fetch API
            fetch(backendUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ token: token })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Gagal verifikasi di backend");
                }
                return response.json();
            })
            .then(result => {
                console.log("Respon dari Backend:", result);
                if (result.message === "Login Sukses!") {
                    statusLabel.innerText = "Selamat! Login Berhasil.";
                    statusLabel.style.color = "green";
                } else {
                    statusLabel.innerText = "Login gagal: " + result.message;
                    statusLabel.style.color = "red";
                }
            })
            .catch(error => {
                console.error("Error:", error);
                statusLabel.innerText = "Terjadi kesalahan koneksi ke backend Alwaysdata.";
                statusLabel.style.color = "red";
            });
        }
    </script>
</body>
</html>
