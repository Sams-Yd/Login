<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Google - Sams Project</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif;">
        <h1 id="title">Selamat Datang di Aplikasi Saya</h1>
        
        <div id="g_id_onload"
             data-client_id="700649521479-pg9lerspa7oos4b5t2ihimf0j76g60l7.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
        
        <p id="status-text" style="margin-top: 20px; color: gray;">Silakan login untuk melanjutkan</p>
    </div>

    <script type="module">
        // 1. Ambil setInner dari file element
        import { setInner } from "https://cdn.jsdelivr.net/gh/crootjs/lib@0.0.1/element.min.js";
        // 2. Ambil postJSON dari file api (Ini yang tadi bikin pusing karena salah file)
        import { postJSON } from "https://cdn.jsdelivr.net/gh/crootjs/lib@0.0.1/api.min.js";

        // Buat fungsi global agar bisa dipanggil Google
        window.handleCredentialResponse = (response) => {
            // Pakai setInner dari CrootJS
            setInner("status-text", "Sedang memverifikasi ke backend...");
            document.getElementById("status-text").style.color = "blue";

            const data_json = { token: response.credential };
            const target_url = "https://hopeful-airport-tir.sgp.dom.my.id/login";

            // Gunakan postJSON dari CrootJS
            postJSON(target_url, "", "", data_json, (result) => {
                console.log("Respon Backend:", result);
                
                if (result.message === "Login Sukses!") {
                    setInner("status-text", "Selamat Datang, Yudha! Login Berhasil.");
                    document.getElementById("status-text").style.color = "green";
                } else {
                    setInner("status-text", "Login Gagal: " + result.message);
                    document.getElementById("status-text").style.color = "red";
                }
            });
        };
    </script>
</body>
</html>
